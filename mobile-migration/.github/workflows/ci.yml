name: Portfolio Tracker CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # 1. Lint & Type Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --upgrade pip
      - run: pip install ruff mypy
      - run: ruff check backend-api/ && ruff format --check backend-api/
      - run: mypy backend-api/app --ignore-missing-imports

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json
      - run: cd mobile-app && npm ci
      - run: cd mobile-app && npm run lint

  # 2. Backend Tests + Alembic Drift Check
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend-api/requirements.txt pytest pytest-asyncio pytest-cov
      - run: cd backend-api && pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80
      - name: Alembic Migration Drift Check
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: cd backend-api && alembic check

  # 3. OpenAPI Contract Validation
  contract:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --upgrade pip
      - run: pip install openapi-spec-validator prance
      - name: Validate OpenAPI Schema
        run: >
          cd backend-api &&
          python -c "
          from prance import ResolvingParser
          from openapi_spec_validator import validate
          parser = ResolvingParser('openapi.yaml', backend='openapi-spec-validator')
          validate(parser.specification)
          print('OpenAPI contract valid')
          "

  # 4. Mobile Unit & Integration Tests
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json
      - run: cd mobile-app && npm ci
      - run: cd mobile-app && npm run test:ci
