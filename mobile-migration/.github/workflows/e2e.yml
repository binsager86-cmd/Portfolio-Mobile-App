name: E2E Tests

on:
  pull_request:
    paths:
      - 'mobile-app/**'
      - 'backend-api/**'

jobs:
  detox-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile-app
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM (Android emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile-app/android/**/*.gradle*') }}

      - name: Prebuild Android
        working-directory: mobile-app
        run: npx expo prebuild --clean --platform android

      - name: Build debug APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Copy APK to bin/
        run: |
          mkdir -p mobile-app/bin
          cp mobile-app/android/app/build/outputs/apk/debug/app-debug.apk mobile-app/bin/

      - name: Run Detox E2E
        working-directory: mobile-app
        env:
          DETOX_HEADLESS: 'true'
        run: npx detox test -c android.emu.debug --loglevel verbose

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-screenshots
          path: mobile-app/artifacts/
          retention-days: 7
