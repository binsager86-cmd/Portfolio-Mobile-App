openapi: 3.1.0
info:
  title: Portfolio Mobile API
  description: 'REST API for the Portfolio Mobile Migration.


    **Versioned API:** All endpoints live under `/api/v1/`.


    **Auth:** POST `/api/v1/auth/login` (JSON) or `/api/v1/auth/login/form` (OAuth2)
    to get a JWT.

    Then click **Authorize** (top-right) and paste the token.'
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: Login Json
      description: "JSON-body login \u2014 friendlier for mobile / React Native clients.\n\
        Accepts {\"username\": \"...\", \"password\": \"...\"} and returns a Bearer\
        \ JWT\nplus a long-lived refresh token."
      operationId: login_json_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/app__schemas__user__LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login/form:
    post:
      tags:
      - Auth
      summary: Login Form
      description: 'OAuth2 password-grant login.

        Use Swagger UI "Authorize" button or POST form-encoded

        username + password. Returns a Bearer JWT token + refresh token.'
      operationId: login_form_api_v1_auth_login_form_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_form_api_v1_auth_login_form_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh Token
      description: 'Exchange a valid refresh token for new access + refresh tokens.


        **Rotation:** The old refresh token''s JTI is blacklisted and a fresh

        refresh token is issued.  Reuse of a revoked token is detected and

        rejected (replay protection).'
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Auth
      summary: Me
      description: Return info about the authenticated user.
      operationId: me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__UserInfo'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register
      description: Create a new user account and return JWT + refresh token.
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/google:
    post:
      tags:
      - Auth
      summary: Google Sign In
      description: "Validate a Google token, create or find the user, and return JWT\
        \ tokens.\n\nAccepts either:\n  - A Google ID token (from native @react-native-google-signin)\n\
        \  - A Google access token (from web expo-auth-session OAuth flow)\n\nWe try\
        \ ID-token verification first; if that fails we try the\naccess_token userinfo\
        \ endpoint as a fallback."
      operationId: google_sign_in_api_v1_auth_google_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleSignInRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/change-password:
    put:
      tags:
      - Auth
      summary: Change Password
      description: Change the authenticated user's password.
      operationId: change_password_api_v1_auth_change_password_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/api-key:
    get:
      tags:
      - Auth
      summary: Get Api Key
      description: Get user's saved API key (masked).
      operationId: get_api_key_api_v1_auth_api_key_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
    put:
      tags:
      - Auth
      summary: Save Api Key
      description: Save user's Gemini API key.
      operationId: save_api_key_api_v1_auth_api_key_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot Password
      description: 'Send a 6-digit OTP to the user''s email for password reset.


        Always returns success (even if email not found) to prevent

        email enumeration attacks.'
      operationId: forgot_password_api_v1_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/verify-otp:
    post:
      tags:
      - Auth
      summary: Verify Otp
      description: 'Verify an OTP code. Returns success if valid, without consuming
        it.

        The OTP is consumed only on the final reset-password call.'
      operationId: verify_otp_api_v1_auth_verify_otp_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset Password
      description: 'Reset the user''s password using a valid OTP code.

        Consumes the OTP on success.'
      operationId: reset_password_api_v1_auth_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/overview:
    get:
      tags:
      - Portfolio
      summary: Portfolio Overview
      description: "Complete portfolio overview \u2014 transaction aggregates, market\
        \ values,\ncash balances, and calculated metrics.  All monetary values in\
        \ KWD.\n\nPass `?fields=summary` for a small payload suitable for dashboard\
        \ cards."
      operationId: portfolio_overview_api_v1_portfolio_overview_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: fields
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated field names to include. Use 'summary' for a
            lightweight subset (total_value, pnl, cash, holdings count).
          title: Fields
        description: Comma-separated field names to include. Use 'summary' for a lightweight
          subset (total_value, pnl, cash, holdings count).
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/holdings:
    get:
      tags:
      - Portfolio
      summary: Portfolio Holdings
      description: 'Current stock holdings with KWD-converted market values and P&L.

        Optionally filter by portfolio name.'
      operationId: portfolio_holdings_api_v1_portfolio_holdings_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: portfolio
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by portfolio name (KFH, BBYN, USA)
          title: Portfolio
        description: Filter by portfolio name (KFH, BBYN, USA)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/table/{portfolio_name}:
    get:
      tags:
      - Portfolio
      summary: Portfolio Table
      description: 'Full holdings table for a single portfolio (KFH, BBYN, USA).

        Returns the same data as the legacy Streamlit portfolio tab.'
      operationId: portfolio_table_api_v1_portfolio_table__portfolio_name__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: portfolio_name
        in: path
        required: true
        schema:
          type: string
          title: Portfolio Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/accounts:
    get:
      tags:
      - Portfolio
      summary: Account Balances
      description: External account cash balances.
      operationId: account_balances_api_v1_portfolio_accounts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /api/v1/portfolio/fx-rate:
    get:
      tags:
      - Portfolio
      summary: Fx Rate
      description: "Current USD\u2192KWD exchange rate (cached for 1 hour)."
      operationId: fx_rate_api_v1_portfolio_fx_rate_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /api/v1/portfolio/transactions:
    get:
      tags:
      - Portfolio
      summary: List Transactions
      description: List transactions with optional filters and pagination.
      operationId: list_transactions_api_v1_portfolio_transactions_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: portfolio
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Portfolio
      - name: stock_symbol
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Stock Symbol
      - name: txn_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Txn Type
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 10000
          minimum: 1
          default: 50
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Portfolio
      summary: Create Transaction
      description: Create a new transaction.
      operationId: create_transaction_api_v1_portfolio_transactions_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Portfolio
      summary: Delete All Transactions
      description: Soft-delete all transactions for the user (optionally filtered
        by portfolio).
      operationId: delete_all_transactions_api_v1_portfolio_transactions_delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: portfolio
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by portfolio (optional)
          title: Portfolio
        description: Filter by portfolio (optional)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/transactions/{txn_id}:
    get:
      tags:
      - Portfolio
      summary: Get Transaction
      description: Get a single transaction by ID.
      operationId: get_transaction_api_v1_portfolio_transactions__txn_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: txn_id
        in: path
        required: true
        schema:
          type: integer
          title: Txn Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Portfolio
      summary: Update Transaction
      description: Update an existing transaction.
      operationId: update_transaction_api_v1_portfolio_transactions__txn_id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: txn_id
        in: path
        required: true
        schema:
          type: integer
          title: Txn Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Portfolio
      summary: Delete Transaction
      description: Soft-delete a transaction.
      operationId: delete_transaction_api_v1_portfolio_transactions__txn_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: txn_id
        in: path
        required: true
        schema:
          type: integer
          title: Txn Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/transactions/{txn_id}/restore:
    post:
      tags:
      - Portfolio
      summary: Restore Transaction
      description: Restore a soft-deleted transaction.
      operationId: restore_transaction_api_v1_portfolio_transactions__txn_id__restore_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: txn_id
        in: path
        required: true
        schema:
          type: integer
          title: Txn Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/holdings-export:
    get:
      tags:
      - Portfolio
      summary: Holdings Export
      description: Export current holdings as Excel (.xlsx).
      operationId: holdings_export_api_v1_portfolio_holdings_export_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: portfolio
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Portfolio
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/portfolio/reset-account:
    post:
      tags:
      - Portfolio
      summary: Reset Account
      description: "Hard-delete ALL portfolio data for the current user, essentially\n\
        resetting the account to a fresh state.  The user record itself\nis preserved\
        \ so they can log in again.\n\nTables cleared (in dependency order):\n  pfm_assets,\
        \ pfm_liabilities, pfm_income_expenses, pfm_snapshots,\n  position_snapshots,\
        \ portfolio_snapshots, portfolio_cash,\n  portfolio_transactions, ledger_entries,\
        \ external_accounts,\n  cash_deposits, transactions, stocks, portfolios, user_settings,\n\
        \  securities_master, security_aliases"
      operationId: reset_account_api_v1_portfolio_reset_account_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /api/v1/cash/deposits:
    get:
      tags:
      - Cash Deposits
      summary: List Deposits
      description: List cash deposits with optional portfolio filter and pagination.
      operationId: list_deposits_api_v1_cash_deposits_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: portfolio
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Portfolio
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Cash Deposits
      summary: Create Deposit
      description: Create a new cash deposit/withdrawal.
      operationId: create_deposit_api_v1_cash_deposits_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashDepositCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cash/deposits/{deposit_id}:
    get:
      tags:
      - Cash Deposits
      summary: Get Deposit
      description: Get a single cash deposit by ID.
      operationId: get_deposit_api_v1_cash_deposits__deposit_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: deposit_id
        in: path
        required: true
        schema:
          type: integer
          title: Deposit Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Cash Deposits
      summary: Update Deposit
      description: Update a cash deposit.
      operationId: update_deposit_api_v1_cash_deposits__deposit_id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: deposit_id
        in: path
        required: true
        schema:
          type: integer
          title: Deposit Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashDepositUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Cash Deposits
      summary: Delete Deposit
      description: Soft-delete a cash deposit.
      operationId: delete_deposit_api_v1_cash_deposits__deposit_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: deposit_id
        in: path
        required: true
        schema:
          type: integer
          title: Deposit Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cash/deposits/{deposit_id}/restore:
    post:
      tags:
      - Cash Deposits
      summary: Restore Deposit
      description: Restore a soft-deleted deposit.
      operationId: restore_deposit_api_v1_cash_deposits__deposit_id__restore_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: deposit_id
        in: path
        required: true
        schema:
          type: integer
          title: Deposit Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cash/deposits-export:
    get:
      tags:
      - Cash Deposits
      summary: Deposits Export
      description: Export all cash deposits/withdrawals as Excel (.xlsx).
      operationId: deposits_export_api_v1_cash_deposits_export_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /api/v1/cash/deposits-import:
    post:
      tags:
      - Cash Deposits
      summary: Deposits Import
      description: "Bulk import cash deposits from an Excel file (.xlsx).\n\nExpected\
        \ columns (case-insensitive, underscores/spaces accepted):\n  - **deposit_date**\
