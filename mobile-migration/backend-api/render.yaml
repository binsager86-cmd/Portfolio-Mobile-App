# ──────────────────────────────────────────────────────────────────────
# Render Blueprint — deploy via https://render.com/docs/blueprint-spec
# Docs: https://docs.render.com/infrastructure-as-code
#
# Usage:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo and point to mobile-migration/backend-api/
#   4. Render reads this file and provisions the service automatically
#
# Database mode:
#   - Production: PostgreSQL managed database (see 'databases' section below).
#     Set DATABASE_URL from the database's internal connection string.
#   - Fallback: set DATABASE_PATH + keep the disk mount to use SQLite.
# ──────────────────────────────────────────────────────────────────────

databases:
  - name: portfolio-db
    plan: basic                              # upgrade to standard for production load
    region: frankfurt                        # must match the web service region
    databaseName: portfolio
    user: portfolio_user
    postgresMajorVersion: 16

services:
  - type: web
    name: portfolio-api
    runtime: docker                          # uses the Dockerfile
    dockerfilePath: ./Dockerfile
    region: frankfurt                         # fra (EU) — change to oregon for US
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    # Run migrations automatically after each deploy
    postDeployCommand: "alembic upgrade head"
    buildFilter:
      paths:
        - mobile-migration/backend-api/**
    envVars:
      # ── Core ──
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true                  # Render auto-generates a random value

      # ── PostgreSQL — wired from the managed database above ──
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString         # full postgresql://user:pass@host/db URL

      # ── CORS — replace with your real Vercel URL after deploy ──
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      # ── JWT ──
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      # ── FX ──
      - key: FX_CACHE_TTL
        value: "3600"
      # ── Cron / Scheduler ──
      - key: CRON_SECRET_KEY
        generateValue: true
      - key: PRICE_UPDATE_ENABLED
        value: "true"
      - key: PRICE_UPDATE_HOUR
        value: "14"                          # 14 UTC ≈ 17:00 Kuwait
      - key: PRICE_UPDATE_MINUTE
        value: "0"
      # ── AI (optional) ──
      - key: GEMINI_API_KEY
        value: ""                            # set manually in Render dashboard
      # ── TickerChart Live (Whale Radar OHLCV + indicators) ──
      - key: TICKERCHART_USERNAME
        sync: false                          # set manually in Render dashboard
      - key: TICKERCHART_PASSWORD
        sync: false                          # set manually in Render dashboard
      - key: GUNICORN_WORKERS
        value: "4"
      - key: MAX_REQUESTS
        value: "2000"
      - key: IMAGE_TAG
        value: ""
    # Persist PDF uploads across deploys (DB is now on Postgres, not disk)
    disk:
      name: portfolio-uploads
      mountPath: /app/uploads
      sizeGB: 2
