# Docker Compose — Portfolio Mobile API
# Usage: docker compose up --build

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    profiles: ["postgres"]
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-portfolio_db}
      - POSTGRES_USER=${POSTGRES_USER:-app_user}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-app_password}
    volumes:
      - pg-data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    container_name: portfolio-pgbouncer
    profiles: ["postgres"]
    restart: unless-stopped
    ports:
      - "6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    environment:
      - PG_PASSWORD=${PG_PASSWORD}
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-api
    ports:
      - "8004:8004"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:-}
      - DATABASE_PATH=/data/portfolio.db
      - SECRET_KEY=${SECRET_KEY:-change_this_to_a_random_string_before_production}
      - CRON_SECRET_KEY=${CRON_SECRET_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:19006,http://localhost:8081}
      - PRICE_UPDATE_ENABLED=${PRICE_UPDATE_ENABLED:-true}
      - PRICE_UPDATE_HOUR=${PRICE_UPDATE_HOUR:-14}
      - PRICE_UPDATE_MINUTE=${PRICE_UPDATE_MINUTE:-0}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db-data:
    driver: local
  pg-data:
    driver: local
